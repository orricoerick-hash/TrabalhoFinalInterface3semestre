<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Cartões</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="components/header.js" defer></script>
    <script src="components/nav.js" defer></script>
    <script src="components/footer.js" defer></script>
    <script src="components/script.js" defer></script>
</head>

<body>
     
    <my-header></my-header>
    <my-nav></my-nav>

    <main class="container my-5" style="min-height: 600px;">
        <div class="row g-4">
            
            <section class="col-md-6 formulario p-4 bg-light rounded shadow-sm">
                <h2 class="mb-4 text-primary">Personalizar Cartão</h2>

                <div class="mb-3">
                    <label for="corFundoCartao" class="form-label fw-bold">Cor de Fundo do Cartão</label>
                    <select id="corFundoCartao" class="form-select">
                        <option value="aniversario">Aniversário</option>
                        <option value="natal">Natal</option>
                        <option value="pascoa">Páscoa</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="mensagem" class="form-label fw-bold">Digite sua mensagem</label>
                    <input type="text" id="mensagem" class="form-control" maxlength="40" placeholder="Ex: Feliz Aniversário!">
                </div>

                <div class="row mb-3">
                    <div class="col-6">
                        <label for="corTexto" class="form-label fw-bold">Cor do texto</label>
                        <input type="color" id="corTexto" class="form-control form-control-color w-100" value="#000000">
                    </div>
                    <div class="col-6">
                        <label for="tamanho" class="form-label fw-bold">Tamanho da fonte</label>
                        <input type="range" min="20" max="50" id="tamanho" class="form-range mt-2">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="imagem" class="form-label fw-bold">Adicionar imagem</label>
                    <select id="imagem" class="form-select">
                        <option value="cartaoImagem/aniversario.jpg">Aniversário</option>
                        <option value="cartaoImagem/natal.jpg">Natal</option>
                        <option value="cartaoImagem/pascoa.jpg">Páscoa</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="emoji" class="form-label fw-bold">Escolha um emoji</label>
                    <select id="emoji" class="form-select">
                        <option value="">Nenhum</option>
                        <option value="🎂">🎂 Aniversário</option>
                        <option value="🎄">🎄 Natal</option>
                        <option value="🐰">🐰 Páscoa</option>
                        <option value="🎉">🎉 Festa</option>
                        <option value="❤️">❤️ Amor</option>
                    </select>
                </div>
            </section>

            <section class="col-md-6 d-flex justify-content-center align-items-start">
                <div id="cartao" class="p-4 text-center shadow rounded" style="background: #ffe4b5; min-width: 320px; max-width: 450px; min-height: 400px; transition: 0.3s;">
                    <h2 id="textoCartao" class="mb-3" style="word-wrap: break-word;">Sua mensagem</h2>
                    
                    <img id="cartaoImagem" src="cartaoImagem/aniversario.jpg" class="img-fluid rounded mb-3" width="350" height="250" alt="Imagem do cartão">
                    
                    <div id="emojiCartao" style="font-size: 3rem;"></div>
                </div>
            </section>

        </div>
    </main>

    <my-footer></my-footer>
         
</body>
</html>
